logging:
  file.name: coding-agent.log
  level:
    org.springframework.ai: DEBUG
coding-agent:
  max-iterations: 10
spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat.options.model: gpt-4o-mini
    session.repository.jdbc.initialize-schema: always
    chat:
      client.observations:
        log-prompt: true
        log-completion: true
      observations:
        log-prompt: true
        log-completion: true
        include-error-logging: true
    tools.observations.include-content: true
  application.name: coding-agent
  main:
    banner-mode: off
    web-application-type: none
